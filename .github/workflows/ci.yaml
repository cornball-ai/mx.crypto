name: ci

on:
  push:
  pull_request:

env:
  _R_CHECK_FORCE_SUGGESTS_: "false"

jobs:
  ci:
    strategy:
      matrix:
        include:
          - {os: macos-latest}
          - {os: ubuntu-latest}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup
        uses: eddelbuettel/github-actions/r-ci@master

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.85 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Dependencies
        run: ./run.sh install_deps

      - name: Install vignette builder
        # simplermarkdown is in Suggests, not Imports, so install_deps
        # skips it. R CMD check needs it present to recognise the
        # .Rmd vignette as a vignette and not a stray file.
        run: Rscript -e 'install.packages("simplermarkdown")'

      - name: Test
        run: ./run.sh run_tests
